<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Toets MML H1</title>
<style>
  :root{
    --bg: #ffffff;
    --fg: #0b1220;
    --muted: #5b667a;
    --card: #f5f7fb;
    --accent: #2b63f1;
    --good: #1a7f37;
    --bad: #c62828;
    --border: #d7dce6;
    --radius: 12px;
    --shadow: 0 2px 10px rgba(0,0,0,.06);
    --tap: 48px; /* minimale tikdoel-hoogte */
  }
  /* Automatische dark mode */
  @media (prefers-color-scheme: dark) {
    :root{
      --bg: #0c111b;
      --fg: #e8edf6;
      --muted: #a8b2c3;
      --card: #141b29;
      --accent: #7aa2ff;
      --good: #41d17b;
      --bad: #ff6b6b;
      --border: #25304a;
      --shadow: 0 2px 10px rgba(0,0,0,.35);
    }
  }
  /* Handmatige dark toggle */
  :root.dark{
    --bg: #0c111b !important;
    --fg: #e8edf6 !important;
    --muted: #a8b2c3 !important;
    --card: #141b29 !important;
    --accent: #7aa2ff !important;
    --good: #41d17b !important;
    --bad: #ff6b6b !important;
    --border: #25304a !important;
    --shadow: 0 2px 10px rgba(0,0,0,.35) !important;
  }

  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font: 16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji","Segoe UI Emoji";
    -webkit-text-size-adjust: 100%;
  }
  header{
    position: sticky; top: 0; z-index: 20;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: .75rem 1rem;
    display: grid; gap: .25rem;
    grid-template-columns: 1fr auto;
    align-items: center;
  }
  header h1{ font-size: 1.125rem; margin: 0; }
  header .sub{ grid-column: 1 / -1; color: var(--muted); font-size: .9rem; }
  .theme-toggle{
    height: var(--tap);
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--fg);
    padding: 0 .875rem;
    font-weight: 700;
  }

  main{
    padding: 1rem;
    max-width: 840px; margin: 0 auto 6.5rem;
    display: grid; gap: 1rem;
  }

  .toolbar{
    display: grid; gap: .5rem;
    grid-template-columns: 1fr;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: .75rem;
  }
  .row{ display: grid; gap: .75rem; grid-template-columns: 1fr; }
  @media (min-width: 560px){
    .row.two { grid-template-columns: 1fr 1fr; }
  }
  label { display: block; font-weight: 600; }

  input[type="range"]{ width: 100%; }
  .actions{ display: grid; gap: .5rem; grid-template-columns: 1fr 1fr; }
  button{
    height: var(--tap);
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--fg);
    font-weight: 700;
  }
  button.primary{
    background: var(--accent);
    color: #fff; border-color: transparent;
  }
  button.danger{
    background: transparent;
    color: var(--bad);
    border-color: var(--bad);
  }
  button:active{ transform: translateY(1px); }
  button:focus-visible{
    outline: 3px solid color-mix(in oklab, var(--accent) 60%, white 40%);
    outline-offset: 2px;
  }

  .vraag{
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 1rem;
  }
  .vraag strong{ display: block; margin-bottom: .25rem; }
  .vraag .vraagtekst{ margin-bottom: .75rem; }

  /* Open vraag input */
  .open-input{
    width: 100%;
    min-height: var(--tap);
    font-size: 1rem;
    padding: .75rem .875rem;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg); color: var(--fg);
  }

  /* MC als kaarten */
  .mc-opties{
    display: grid; gap: .5rem;
  }
  .mc-card{
    display: grid; grid-template-columns: auto 1fr;
    align-items: center;
    gap: .75rem;
    padding: .75rem;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--bg);
    min-height: var(--tap);
    touch-action: pan-y; /* laat horizontale swipe toe */
  }
  .mc-card input[type="radio"]{ width: 22px; height: 22px; }
  .mc-card.selected{
    border-color: var(--accent);
    outline: 2px solid color-mix(in oklab, var(--accent) 50%, transparent);
  }
  .swipe-hint{
    margin-top: .25rem; color: var(--muted); font-size: .9rem;
  }

  /* Stelling toggle knoppen */
  .stelling{ display: grid; gap: .5rem; grid-template-columns: 1fr 1fr; }
  .toggle{
    display: grid; place-items: center;
    min-height: var(--tap);
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg);
    font-weight: 700;
    touch-action: pan-y;
  }
  .toggle:has(input:checked){
    background: color-mix(in oklab, var(--accent) 14%, var(--bg));
    border-color: var(--accent);
    color: var(--fg);
  }
  .toggle input{ position: absolute; opacity: 0; pointer-events: none; }

  /* === KOPPELEN ALS TEGELOPTIES (2×2) === */
  .koppel-tabel{ display: grid; gap: .75rem; }
  .koppel-item{
    display: grid; gap: .75rem;
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: .75rem;
    background: color-mix(in oklab, var(--bg) 96%, transparent);
  }
  .k-term{ font-weight: 700; }
  .tiles-grid{
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: .5rem;
  }
  .option-tile{
    position: relative;
    display: grid; place-items: center;
    min-height: var(--tap);
    padding: .5rem .75rem;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: var(--bg);
    text-align: center;
    font-weight: 600;
    user-select: none;
  }
  .option-tile input{
    position: absolute; inset: 0;
    opacity: 0; pointer-events: none;
  }
  .option-tile:has(input:checked){
    border-color: var(--accent);
    outline: 3px solid color-mix(in oklab, var(--accent) 35%, transparent);
    background: color-mix(in oklab, var(--accent) 12%, var(--bg));
  }

  .feedback{ margin-top: .5rem; }
  .goed{ color: var(--good); font-weight: 700; }
  .fout{ color: var(--bad); font-weight: 700; }

  /* Sticky bottom action bar */
  .stickybar{
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: .5rem .75rem;
    display: grid; gap: .5rem;
    grid-template-columns: 1fr 1fr;
    z-index: 30;
  }

  .muted{ color: var(--muted); font-size: .9rem; }
</style>
</head>

<header>
  <h1>Toets — mobiel</h1>

<script>
/* ================== RANDOM/SHUFFLE (bias-vrij) ================== */
function fyShuffle(array, rndFn) {
  const a = [...array];
  const rnd = rndFn || (typeof crypto !== "undefined" && crypto.getRandomValues
    ? (n) => { const u = new Uint32Array(1); crypto.getRandomValues(u); return u[0] % n; }
    : (n) => Math.floor(Math.random() * n)
  );
  for (let i = a.length - 1; i > 0; i--) {
    const j = rnd(i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pickN(arr, n, rndFn){ return fyShuffle(arr, rndFn).slice(0, n); }

/* ================== HASH + HISTORY ================== */
function hashSelection(sections) {
  const norm = (v) => Array.isArray(v) ? [...v].sort().join("|") : String(v);
  const key = ["O:"+norm(sections.open),"M:"+norm(sections.mc),"S:"+norm(sections.st),"K:"+norm(sections.koppels)].join("||");
  let h = 0; for (let i=0;i<key.length;i++){ h=((h<<5)-h)+key.charCodeAt(i); h|=0; }
  return h.toString();
}
function getSeenSet(){
  try{ const raw = localStorage.getItem("toets_seen_hashes"); return new Set(raw ? JSON.parse(raw) : []); }catch(e){ return new Set(); }
}
function saveSeen(hash){
  try{
    const raw = localStorage.getItem("toets_seen_hashes");
    const arr = raw ? JSON.parse(raw) : [];
    if (!arr.includes(hash)){ arr.push(hash); if (arr.length>500) arr.splice(0, arr.length-500); localStorage.setItem("toets_seen_hashes", JSON.stringify(arr)); }
  }catch(e){}
}
function resetSeen(){ try{ localStorage.removeItem("toets_seen_hashes"); }catch(e){} }

  { id:"k-kashrut", term:"Het geheel aan joodse spijswetten (wat koosjer is en hoe het wordt bereid)", antwoord:"Kashrut", uitleg:"Kashrut bepaalt wat koosjer is." },
  { id:"k-halacha", term:"Het geheel van joodse religieuze wet en voorschriften waar spijswetten onder vallen", antwoord:"Halacha", uitleg:"Halacha omvat o.a. Kashrut en regels rond shechita." },

  { id:"k-analogiebesluit", term:"Dieren reageren vergelijkbaar op pijn zoals mensen", antwoord:"Analogiebesluit", uitleg:"Als reactie lijkt op de mens, is er waarschijnlijk pijn." },
  { id:"k-dierproef-doelen", term:"Drie kernredenen: onderzoek, veiligheidstesten en onderwijs", antwoord:"Doelen van dierproeven", uitleg:"Gebruik: onderzoek, veiligheid, onderwijs." },

  { id:"k-gen-manipulatie", term:"Het doelgericht aanpassen van DNA om eigenschappen te veranderen", antwoord:"Genetische manipulatie", uitleg:"Wijzigen van genen voor gewenste eigenschappen." },
];

/* ================== STATE ================== */
let openSel = [], mcSel = [], st = null, koppelSel = [];

/* ================== GENERATOR (random + anti-duplicaat) ================== */
function genereerToets(){
  const container = document.getElementById("toets");
  container.setAttribute("aria-busy","true");
  container.innerHTML = "";

  const seen = getSeenSet();
  const maxAttempts = 60;
  let attempt = 0, ok = false, h = null;

  while(attempt++ < maxAttempts && !ok){
    const o = pickN(openVragen, 2);
    const m = pickN(mcVragen, 2);
    const s = pickN(stellingen, 1)[0];
    const k = pickN(koppelPool, 4);

    const combo = { open: o.map(x=>x.id), mc: m.map(x=>x.id), st: s.id, koppels: k.map(x=>x.id) };
    const hash = hashSelection(combo);
    if (!seen.has(hash)){
      openSel = o; mcSel = m; st = s; koppelSel = k; h = hash; ok = true;
    }
  }
  if (!ok){
    resetSeen();
    openSel = pickN(openVragen, 2);
    mcSel   = pickN(mcVragen, 2);
    st      = pickN(stellingen, 1)[0];
    koppelSel = pickN(koppelPool, 4);
    h = hashSelection({ open: openSel.map(x=>x.id), mc: mcSel.map(x=>x.id), st: st.id, koppels: koppelSel.map(x=>x.id) });
  } else {
    saveSeen(h);
  }

  // --- RENDER ---
  // Open vragen
  openSel.forEach((q,i)=>{
    container.insertAdjacentHTML("beforeend", `
      <article class="vraag">
        <strong>Open vraag ${i+1}</strong>
        <div class="vraagtekst">${q.vraag}</div>
        <textarea class="open-input" id="open${i}" rows="3" inputmode="text" placeholder="Typ je antwoord..."></textarea>
        <div class="feedback" id="fOpen${i}" aria-live="polite"></div>
      </article>
    `);
  });

  // Meerkeuze (met swipe uit eerdere versie)
  mcSel.forEach((q,i)=>{
    const name = `mc${i}`;
    let opts = "";
    q.opties.forEach((o,idx)=>{
      const optId = `${name}-${idx}`;
      opts += `
        <label class="mc-card" for="${optId}" data-mc-index="${i}" data-opt-index="${idx}">
          <input type="radio" id="${optId}" name="${name}" value="${idx}" />
          <span>${o}</span>
        </label>
      `;
    });
    container.insertAdjacentHTML("beforeend", `
      <article class="vraag" data-mc="${i}">
        <strong>Meerkeuze ${i+1}</strong>
        <div class="vraagtekst">${q.vraag}</div>
        <div class="mc-opties" id="mcWrap${i}">${opts}</div>
        <div class="swipe-hint">Tip: swipe <strong>links/rechts</strong> over de opties om te wisselen.</div>
        <div class="feedback" id="fMc${i}" aria-live="polite"></div>
      </article>
    `);
  });

  // Stelling
  container.insertAdjacentHTML("beforeend", `
    <article class="vraag" id="stellingCard">
      <strong>Stelling</strong>
      <div class="vraagtekst">"${st.vraag}"</div>
      <div class="stelling">
        <label class="toggle">
          <input type="radio" name="st" value="eens" />
          Eens
        </label>
        <label class="toggle">
          <input type="radio" name="st" value="oneens" />
          Oneens
        </label>
      </div>
      <div class="swipe-hint">Tip: swipe <strong>rechts = eens</strong>, <strong>links = oneens</strong>.</div>
      <div class="feedback" id="fSt" aria-live="polite"></div>
    </article>
  `);

  // === KOPPELEN: TEGELS (2×2) IN PLAATS VAN DROPDOWN ===
  const antwoordOpties = fyShuffle(koppelSel.map(e=>e.antwoord));
  let kHTML = "";
  koppelSel.forEach((e,i)=>{
    const groupName = `k${i}`;
    const tiles = antwoordOpties.map((o,idx)=>{
      const id = `${groupName}-opt${idx}`;
      return `
        <label class="option-tile" for="${id}">
          <input type="radio" id="${id}" name="${groupName}" value="${o}">
          <span>${o}</span>
        </label>
      `;
    }).join("");
    kHTML += `
      <div class="koppel-item">
        <div class="k-term">${e.term}</div>
        <div class="tiles-grid" role="radiogroup" aria-label="Antwoordopties voor koppelen (${i+1})">
          ${tiles}
        </div>
        <div class="feedback" id="fK${i}" aria-live="polite"></div>
      </div>
    `;
  });
  container.insertAdjacentHTML("beforeend", `
    <article class="vraag">
      <strong>Koppel de begrippen</strong>
      <div class="koppel-tabel">
        ${kHTML}
      </div>
    </article>
  `);

  container.setAttribute("aria-busy","false");

  // Activeer swipe‑handlers voor MC en stelling
  enableSwipeForMC();
  enableSwipeForStelling();
}

/* ================== CHECKER ================== */
function checkAntwoorden(){
  const accEl = document.getElementById("accuracy");
  const acc = accEl ? parseFloat(accEl.value) : 0.6;

  // Open
  openSel.forEach((q,i)=>{
    const el = document.getElementById("open"+i);
    const txt = (el?.value || "").toLowerCase();
    const score = q.kern.filter(w=>txt.includes(w)).length / q.kern.length;
    document.getElementById("fOpen"+i).innerHTML =
      score>=acc ? "<span class='goed'>✓ Juist</span>" :
      "<span class='fout'>✗ Onjuist</span><br><em>"+q.uitleg+"</em>";
  });

  // MC  (LET OP: gefixte regel hieronder)
  mcSel.forEach((q,i)=>{
    const c = document.querySelector(`input[name=mc${i}]:checked`);
    document.getElementById("fMc" + i).innerHTML =
      c && Number(c.value)===q.correct
      ? "<span class='goed'>✓ Juist</span>"
      : "<span class='fout'>✗ Onjuist</span><br><em>"+q.uitleg+"</em>";
  });

  // Stelling
  const stc = document.querySelector(`input[name=st]:checked`);
  document.getElementById("fSt").innerHTML =
    stc && stc.value===st.correct
    ? "<span class='goed'>✓ Juist</span>"
    : "<span class='fout'>✗ Onjuist</span><br><em>"+st.uitleg+"</em>";

  // === KOPPELEN (tegel-UI)
  koppelSel.forEach((e, i) => {
    const gekozen = document.querySelector(`input[name="k${i}"]:checked`)?.value || "";
    const feedback = document.getElementById("fK" + i);
    if (gekozen === e.antwoord) {
      feedback.innerHTML = "<span class='goed'>✓ Juist</span>";
    } else {
      feedback.innerHTML =
        "<span class='fout'>✗ Onjuist</span><br>" +
        "<strong>Juiste antwoord:</strong> " + e.antwoord + "<br>" +
        "<small><em>" + e.uitleg + "</em></small>";
    }
  });

  if (navigator.vibrate) navigator.vibrate(30);
}

/* ================== SWIPE HELPERS ================== */
function makeSwipeable(el, onSwipeLeft, onSwipeRight){
  let startX = 0, startY = 0, isTouch = false;
  const THRESHOLD = 40;
  el.addEventListener("touchstart", (e)=>{
    if (!e.touches || e.touches.length !== 1) return;
    isTouch = true;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, {passive:true});
  el.addEventListener("touchend", (e)=>{
    if (!isTouch) return;
    const t = e.changedTouches && e.changedTouches[0];
    if (!t) return;
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > THRESHOLD){
      if (dx < 0 && onSwipeLeft)  onSwipeLeft();
      if (dx > 0 && onSwipeRight) onSwipeRight();
      if (navigator.vibrate) navigator.vibrate(15);
    }
    isTouch = false;
  }, {passive:true});
}

function enableSwipeForMC(){
  mcSel.forEach((q,i)=>{
    const wrap = document.getElementById(`mcWrap${i}`);
    if (!wrap) return;
    let current = 0;
    const radios = wrap.querySelectorAll(`input[name=mc${i}]`);
    const cards  = wrap.querySelectorAll(`.mc-card`);

    function selectIndex(idx){
      current = (idx + q.opties.length) % q.opties.length;
      radios[current].checked = true;
      cards.forEach(c=>c.classList.remove('selected'));
      cards[current].classList.add('selected');
    }
    const chosen = wrap.querySelector(`input[name=mc${i}]:checked`);
    if (chosen) current = Number(chosen.value); else selectIndex(0);

    makeSwipeable(wrap,
      ()=> selectIndex(current + 1),
      ()=> selectIndex(current - 1)
    );

    cards.forEach(c=>{
      c.addEventListener('click', ()=>{
        const idx = Number(c.getAttribute('data-opt-index'));
        selectIndex(idx);
      });
    });
  });
}

function enableSwipeForStelling(){
  const card = document.getElementById('stellingCard');
  if (!card) return;
  const set = (val)=>{
    const input = document.querySelector(`input[name=st][value="${val}"]`);
    if (input){ input.checked = true; }
  };
  makeSwipeable(card, ()=> set('oneens'), ()=> set('eens'));
}

/* ================== UI HOOKS ================== */
function syncAccVal(){
  const el = document.getElementById("accVal");
  const r = document.getElementById("accuracy");
  if (el && r) el.textContent = `(${Number(r.value).toFixed(2)})`;
}

document.getElementById("btnGen").addEventListener("click", genereerToets);
document.getElementById("btnGen2").addEventListener("click", genereerToets);
document.getElementById("btnCheck").addEventListener("click", checkAntwoorden);
document.getElementById("btnCheck2").addEventListener("click", checkAntwoorden);
document.getElementById("btnReset").addEventListener("click", ()=>{
  resetSeen();
  const btn = document.getElementById("btnReset");
  const old = btn.textContent;
  btn.textContent = "Gerest — combinaties gewist";
  setTimeout(()=> btn.textContent = old, 1800);
});
document.getElementById("accuracy").addEventListener("input", syncAccVal);

// Dark-mode toggle voor directe test
const themeBtn = document.getElementById('btnTheme');
themeBtn.addEventListener('click', ()=>{
  const root = document.documentElement;
  const isDark = root.classList.toggle('dark');
  themeBtn.setAttribute('aria-pressed', String(isDark));
});

syncAccVal();
genereerToets();
</script>
